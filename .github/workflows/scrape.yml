name: Daily Scrape

on:
  schedule:
    - cron: '0 19 * * *'   # 03:00 SGT = 19:00 UTC
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max listing pages for Phase 1 (default: all)"
        required: false
        default: ""
      detail_limit:
        description: "Max detail pages for Phase 2 (default: all)"
        required: false
        default: ""

concurrency:
  group: daily-scrape
  cancel-in-progress: false  # don't kill a running scrape

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.max_pages }}" ] && ARGS="$ARGS --max-pages ${{ github.event.inputs.max_pages }}"
          [ -n "${{ github.event.inputs.detail_limit }}" ] && ARGS="$ARGS --detail-limit ${{ github.event.inputs.detail_limit }}"
          python ci_run.py $ARGS
        env:
          PYTHONUNBUFFERED: "1"
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output
          path: output/
          retention-days: 7
