name: Daily Scrape

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max listing pages for Phase 1 (default: all)"
        required: false
        default: ""
      detail_limit:
        description: "Max detail pages for Phase 2 (default: all)"
        required: false
        default: ""
      reset_db:
        description: "Delete existing DB from R2 before running"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
      runner:
        description: "Runner to use"
        required: false
        default: "self-hosted"
        type: choice
        options:
          - "self-hosted"
          - "ubuntu-latest"

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ${{ github.event.inputs.runner || 'self-hosted' }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet -r requirements.txt

      - name: Run daily scrape
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.max_pages }}" ] && ARGS="$ARGS --max-pages ${{ github.event.inputs.max_pages }}"
          [ -n "${{ github.event.inputs.detail_limit }}" ] && ARGS="$ARGS --detail-limit ${{ github.event.inputs.detail_limit }}"
          [ "${{ github.event.inputs.reset_db }}" = "true" ] && ARGS="$ARGS --reset-db"
          python3 ci_run.py $ARGS
        env:
          PYTHONUNBUFFERED: "1"
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output
          path: output/
          retention-days: 7
